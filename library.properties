/*
  BasicControl.ino

  Control a FastCon/brMesh bulb that has already been paired/provisioned.

  Update the key/light ID if needed.
*/

#include <Arduino.h>
#include <FastConSimple.h>

FastConSimple light;

static String readLine() {
  static String buffer;

  while (Serial.available()) {
    char c = static_cast<char>(Serial.read());

    if (c == '\r') continue;

    if (c == '\n') {
      String line = buffer;
      buffer = "";
      line.trim();
      return line;
    }

    buffer += c;
  }

  return "";
}

void setup() {
  Serial.begin(115200);
  delay(1000);

  Serial.println();
  Serial.println("FastConSimple BasicControl example");

  light.setDebug(true);
  light.begin("FastConBasic");

  light.loadConfig();

  // Known working example key from pairing tests.
  light.setMeshKeyAscii("2907");
  light.setLightId(1);
  light.saveConfig();

  Serial.println("Commands: on, off, b <0-127>, red, green, blue, white");
}

void loop() {
  String line = readLine();

  if (line.length() == 0) return;

  if (line == "on") {
    light.on();
  } else if (line == "off") {
    light.off();
  } else if (line.startsWith("b ")) {
    int value = line.substring(2).toInt();
    if (value < 0) value = 0;
    if (value > 127) value = 127;
    light.setBrightness(static_cast<uint8_t>(value));
  } else if (line == "red") {
    light.setRGB(255, 0, 0);
  } else if (line == "green") {
    light.setRGB(0, 255, 0);
  } else if (line == "blue") {
    light.setRGB(0, 0, 255);
  } else if (line == "white") {
    light.setWhite();
  } else {
    Serial.println("Commands: on, off, b <0-127>, red, green, blue, white");
  }
}
